<!DOCTYPE html>
<html>
<head>
    <title>Creează Sondaj - UniVoice</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 150px; }
        .btn { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn-secondary { background: #6c757d; text-decoration: none; display: inline-block; }
        .checkbox-group { display: flex; align-items: center; }
        .checkbox-group input { width: auto; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Creează un Sondaj Nou</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="title">Titlu Sondaj</label>
            <input type="text" id="title" name="title" required placeholder="Ex: Alegere Reprezentant">
        </div>
        
        <div class="form-group">
            <label for="question">Întrebare</label>
            <input type="text" id="question" name="question" required placeholder="Ex: Pe cine doriți să alegeți?">
        </div>
        
        <div class="form-group">
            <label for="options">Opțiuni de Răspuns (una pe linie)</label>
            <textarea id="options" name="options" required placeholder="Candidat 1&#10;Candidat 2&#10;Abținere"></textarea>
        </div>

        <div class="form-group">
            <label for="target_audience">Vizibilitate Sondaj</label>
            <select id="target_audience" name="target_audience" class="form-control" style="width: 100%; padding: 8px;">
                {% if is_professor or is_admin %}
                <option value="all">Vizibil pentru toți (Studenți și Profesori)</option>
                <option value="students">Vizibil doar pentru Studenți</option>
                <option value="professors">Vizibil doar pentru Profesori</option>
                {% else %}
                <option value="students">Vizibil doar pentru Studenți</option>
                {% endif %}
            </select>
        </div>
        
        <button type="submit" class="btn">Creează Sondaj</button>
        <a href="/" class="btn btn-secondary">Anulează</a>
    </form>
</body>
</html>
